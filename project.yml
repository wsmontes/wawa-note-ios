name: wawa-note

options:
  bundleIdPrefix: com.wawa-note
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"

targets:
  wawa-note:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-note
        excludes:
          - "**/.DS_Store"
    capabilities:
      - backgroundModes:
          - audio
      - appGroups:
          - group.com.wawa-note
    dependencies:
      - target: wawa-note-watch
      - target: wawa-note-share
    settings:
      base:
        INFOPLIST_FILE: wawa-note/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note
        PRODUCT_NAME: "Wawa Note"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"

  wawa-noteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-noteTests
        optional: true
    dependencies:
      - target: wawa-note
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.tests

  wawa-note-share:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-note-share
    capabilities:
      - appGroups:
          - group.com.wawa-note
    settings:
      base:
        INFOPLIST_FILE: wawa-note-share/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.share
        PRODUCT_NAME: "Wawa Note Share"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"

  wawa-note-watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: wawa-note-watch
      - path: wawa-note/Connectivity/WatchMessageTypes.swift
      - path: wawa-note/Utilities/Logging.swift
    capabilities:
      - appGroups:
          - group.com.wawa-note
    dependencies:
      - target: wawa-note-watch-widget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.watchkitapp
        PRODUCT_NAME: "Wawa Note"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.wawa-note
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: "NO"

  wawa-note-watch-widget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: wawa-note-watch-widget
      - path: wawa-note/Connectivity/WatchMessageTypes.swift
    capabilities:
      - appGroups:
          - group.com.wawa-note
    settings:
      base:
        INFOPLIST_FILE: wawa-note-watch-widget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.watchkitapp.widget
        PRODUCT_NAME: "Wawa Note Widget"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
