name: wawa-note

packages:
  Yams:
    url: https://github.com/jpsim/Yams
    from: 5.1.0

options:
  bundleIdPrefix: com.wawa-note
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.5"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"

schemes:
  wawa-note:
    build:
      targets:
        wawa-note: all
        wawa-noteTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - wawa-noteTests

targets:
  WawaNoteCore:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: WawaNoteCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.core
        REQUIRE_ONLY_APP_EXTENSION_SAFE_API: "YES"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: "YES"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic

  wawa-note:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-note
        excludes:
          - "**/.DS_Store"
          - "**/*.json"
          - "**/Info.plist"
        resources:
          - path: wawa-note/Resources/Skills
            type: process
    capabilities:
      - backgroundModes:
          - audio
      - appGroups:
          - group.com.wawa-note
    dependencies:
      - target: wawa-note-watch
      - target: WawaNoteCore
      - target: wawa-note-share
      - package: Yams
    settings:
      base:
        INFOPLIST_FILE: wawa-note/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note
        PRODUCT_NAME: "Wawa Note"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: "NO"
        CODE_SIGN_ENTITLEMENTS: wawa-note/wawa-note.entitlements

  wawa-noteTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-noteTests
    dependencies:
      - target: wawa-note-watch
      - target: wawa-note
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.tests

  wawa-note-share:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: wawa-note-share
    capabilities:
      - appGroups:
          - group.com.wawa-note
    dependencies:
      - target: WawaNoteCore
    settings:
      base:
        INFOPLIST_FILE: wawa-note-share/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.share
        PRODUCT_NAME: "Wawa Note Share"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: wawa-note-share/wawa-note-share.entitlements

  wawa-note-watch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: wawa-note-watch
      - path: wawa-note/Connectivity/WatchMessageTypes.swift
      - path: wawa-note/Utilities/Logging.swift
    capabilities:
      - appGroups:
          - group.com.wawa-note
    dependencies:
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.watchkitapp
        PRODUCT_NAME: "Wawa Note"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "4"
        SWIFT_VERSION: "6.0"
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.wawa-note
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: "NO"

  wawa-note-watch-widget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: wawa-note-watch-widget
      - path: wawa-note/Connectivity/WatchMessageTypes.swift
    capabilities:
      - appGroups:
          - group.com.wawa-note
    settings:
      base:
        INFOPLIST_FILE: wawa-note-watch-widget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        PRODUCT_BUNDLE_IDENTIFIER: com.wawa-note.watchkitapp.widget
        PRODUCT_NAME: "Wawa Note Widget"
        DEVELOPMENT_TEAM: 955573A4YH
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "6.0"
